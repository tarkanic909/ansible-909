---
- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_installed

- name: Check k3s version
  ansible.builtin.command: /usr/local/bin/k3s --version
  register: k3s_version_check
  when: k3s_installed.stat.exists
  changed_when: false
    
- name: Download k3s installation
  ansible.builtin.get_url:
    url: "{{ k3s_install_url }}"
    dest: /usr/local/bin/k3s-install.sh
    owner: root
    group: root
    mode: "0755"
  when: >
    not k3s_installed.stat.exists or
    k3s_version not in (k3s_version_check.stdout | default(''))

- name: Install k3s
  ansible.builtin.command: 
    cmd: /usr/local/bin/k3s-install.sh
  environment:
    INSTALL_K3S_SKIP_START: "true"
    INSTALL_K3S_SYSTEMD_DIR: "{{ systemd_dir }}"
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: "{{ k3s_exec }}"
  when: >
    not k3s_installed.stat.exists or
    k3s_version not in (k3s_version_check.stdout | default(''))