---
- name: Install k3s
  ansible.builtin.include_role:
    name: k3s_install

- name: Ensure k3s service is enabled and started
  ansible.builtin.systemd:
    name: "{{ k3s_service_name }}"
    state: started
    enabled: true

- name: Expose join token for workers
  when: k3s_expose_token
  block:
    - name: Wait for k3s token file to be created
      ansible.builtin.wait_for:
        path: /var/lib/rancher/k3s/server/node-token
        state: present

    - name: Get join token
      ansible.builtin.command: cat /var/lib/rancher/k3s/server/node-token
      register: k3s_join_token
      changed_when: false

    - name: Store join token as fact
      ansible.builtin.set_fact:
        k3s_join_token: "{{ k3s_join_token.stdout }}"
